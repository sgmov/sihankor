name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -- --nocapture
      - run: cargo clippy
      - run: cargo fmt --check

  # SiHankor 自治理：让司衡治理自己的 .sih.md 文档树
  # --strict 模式：F 级违规 + parse/db 错误即阻断（plan 260628-2030-ci-self-govern）
  # 53 F 违规已清账，CI 真正成为 governance gate
  # 新规则（upstream 链完整性、stage 转换合法性）默认不阻断，等数据积累后单独 plan 升级
  self-govern:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: SiHankor self-governance check (--strict)
        # --strict 模式：F 级违规 + parse/db 错误即阻断
        # 见 plan 260628-2030-ci-self-govern
        run: cargo run --quiet --bin rebuild_index -- --strict
      - name: Upload governance report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sihankor-self-govern-report
          path: .sih/index.db
          retention-days: 7
