<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SiHankor - 司衡工厂产线</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:-apple-system,system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ---- top bar ---- */
.top-bar{flex-shrink:0;background:#16213e;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #0f3460}
.top-bar .title{font-size:15px;color:#e94560;font-weight:bold}
.top-bar .badges{display:flex;gap:8px;font-size:11px}
.badge{padding:3px 10px;border-radius:4px;font-weight:bold}
.badge-ok{background:#0f3460;color:#e0e0e0}
.badge-err{background:#e94560;color:#fff}
.badge-warn{background:#f0a500;color:#000}

/* ---- phase tabs ---- */
.tabs{flex-shrink:0;display:flex;background:#111827;border-bottom:1px solid #0f3460;overflow-x:auto;scrollbar-width:none}
.tab{flex:1;padding:10px 12px;font-size:12px;text-align:center;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;min-width:70px;transition:.15s}
.tab:hover{background:#16213e}
.tab.active{border-bottom-color:#e94560;background:#16213e;font-weight:bold}
.tab .t-count{font-size:10px;color:#888;display:block}
.tab.active .t-count{color:#e94560}

/* ---- content area ---- */
.content{flex:1;overflow-y:auto;padding:16px;scrollbar-width:thin;scrollbar-color:#0f3460 #1a1a2e}
.content h3{font-size:16px;margin-bottom:4px}
.content .desc{font-size:11px;color:#888;margin-bottom:14px}

/* ---- card ---- */
.card{background:#16213e;border:1px solid #0f3460;border-radius:6px;padding:10px 14px;margin-bottom:6px;cursor:pointer;max-width:600px}
.card:hover{border-color:#e94560}
.card .head{display:flex;justify-content:space-between;align-items:center}
.card .title{font-size:13px;font-weight:bold;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .dot{width:8px;height:8px;border-radius:50%;margin-left:8px;flex-shrink:0}
.card .meta{font-size:11px;color:#999;margin-top:3px}
.card .detail{display:none;margin-top:8px;font-size:11px;color:#aaa;line-height:1.5}
.card.open .detail{display:block}
.card .blocker{color:#e94560;font-weight:bold;font-size:11px;margin-top:4px}
.dot-ok{background:#0f3460}
.dot-warn{background:#f0a500}
.dot-err{background:#e94560}
.dot-pend{background:#555}
.dot-live{background:#4fc3f7;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* grouped verify */
.vgroup{margin-bottom:10px;max-width:600px}
.vgroup .vhdr{font-size:11px;color:#e94560;padding:3px 0;border-bottom:1px solid #0f3460;margin-bottom:3px;cursor:pointer;display:flex;justify-content:space-between}
.vgroup.shut .card{display:none}
.vgroup.shut .vhdr{margin-bottom:0;border-bottom:none}

.empty{color:#444;text-align:center;padding:40px;font-size:13px}

/* ---- bottom bar ---- */
.bottom-bar{flex-shrink:0;background:#111827;border-top:1px solid #0f3460;padding:8px 16px;display:flex;justify-content:space-between;align-items:center}
.bottom-bar .step-label{font-size:11px;color:#888}
.bottom-bar .btns{display:flex;gap:8px}
.bottom-bar button{background:#16213e;color:#e0e0e0;border:1px solid #0f3460;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:12px}
.bottom-bar button:hover:not(:disabled){border-color:#e94560}
.bottom-bar button:disabled{opacity:.3;cursor:default}
</style>
</head>
<body>

<!-- top bar -->
<div class="top-bar">
<span class="title">SiHankor 工厂产线</span>
<div class="badges">
<span id="b-fatal" class="badge badge-ok">F:0</span>
<span id="b-warn" class="badge badge-ok">G:0</span>
<span id="b-total" class="badge badge-ok">总:0</span>
</div>
</div>

<!-- phase tabs -->
<div class="tabs" id="tabs"></div>

<!-- content -->
<div class="content" id="content"><div class="empty">加载中...</div></div>

<!-- bottom bar -->
<div class="bottom-bar">
<span class="step-label" id="step-label"></span>
<div class="btns">
<button id="btn-prev" onclick="nav(-1)">上一步</button>
<button id="btn-next" onclick="nav(1)">下一步</button>
</div>
</div>

<script>
let idx=0,cols=[],data=null;

async function fetchData(){
    try{
        const r=await fetch('/api/dashboard');
        data=await r.json();
        cols=data.columns||[];
        render();
    }catch(e){
        document.getElementById('content').innerHTML='<div class="empty">'+e.message+'</div>';
    }
}

function render(){
    if(!cols.length)return;

    // badges
    const all=cols.flatMap(c=>c.cards||[]);
    const e=all.filter(c=>c.status==='Error'||c.status==='error').length;
    const w=all.filter(c=>c.status==='Warning'||c.status==='warning').length;
    document.getElementById('b-fatal').textContent='F:'+e;
    document.getElementById('b-fatal').className='badge'+(e?' badge-err':' badge-ok');
    document.getElementById('b-warn').textContent='G:'+w;
    document.getElementById('b-warn').className='badge'+(w?' badge-warn':' badge-ok');
    document.getElementById('b-total').textContent='总:'+data.summary.total_cards;

    // tabs
    const tabs=document.getElementById('tabs');
    tabs.innerHTML='';
    for(let i=0;i<cols.length;i++){
        const c=cols[i];
        const cs=c.cards||[];
        const ce=cs.filter(x=>x.status==='Error'||x.status==='error').length;
        const cw=cs.filter(x=>x.status==='Warning'||x.status==='warning').length;
        const live=cs.some(x=>x.status==='in_progress');
        const t=document.createElement('div');
        t.className='tab'+(i===idx?' active':'');
        if(live)t.style.color='#4fc3f7';
        t.innerHTML=c.label+'<span class="t-count">'+(ce||cw||cs.length)+'</span>';
        t.onclick=()=>{idx=i;render();};
        tabs.appendChild(t);
    }

    showColumn();
}

function showColumn(){
    const col=cols[idx];
    const cards=col.cards||[];
    const live=cards.some(c=>c.status==='in_progress');

    // update tabs
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));

    // content
    const body=document.getElementById('content');
    body.innerHTML='<h3 style="color:'+(live?'#e94560':'#e0e0e0')+'">'+col.label+'</h3>'+
        '<div class="desc">'+(col.entry_condition||'')+'</div>';

    if(!cards.length){
        body.innerHTML+='<div class="empty">--- 空闲 ---</div>';
    }else if(col.phase==='verify'){
        const groups=col.groups||[];
        if(groups.length){
            for(const g of groups){
                const d=document.createElement('div');d.className='vgroup';
                d.innerHTML='<div class="vhdr" onclick="this.parentElement.classList.toggle(\'shut\')">'+g.nature+' ('+g.attention.length+')</div>';
                for(const c of g.attention||[])d.appendChild(cardEl(c));
                body.appendChild(d);
            }
        }
        for(const c of cards)body.appendChild(cardEl(c));
    }else{
        for(const c of cards)body.appendChild(cardEl(c));
    }

    // bottom
    document.getElementById('step-label').textContent=(idx+1)+' / '+cols.length;
    document.getElementById('btn-prev').disabled=idx===0;
    document.getElementById('btn-next').disabled=idx===cols.length-1;
}

function cardEl(card){
    const m=document.createElement('div');m.className='card';
    const t=(card.title||card.id||'?').slice(0,60);
    let dot='dot-ok';
    if(card.status==='Error'||card.status==='error')dot='dot-err';
    else if(card.status==='Warning'||card.status==='warning')dot='dot-warn';
    else if(card.status==='in_progress')dot='dot-live';
    else if(card.status==='pending')dot='dot-pend';
    const s=card.stage||'';
    const n=card.nature||card.entity_type||'';
    const su=card.summary||'';
    m.innerHTML='<div class="head"><span class="title">'+t+'</span><span class="dot '+dot+'"></span></div>'+
        '<div class="meta">'+(s?'['+s+'] ':'')+n+'</div>'+
        '<div class="detail">'+
        (su?'<div>'+su+'</div>':'')+
        (card.blockers&&card.blockers.length?'<div class="blocker">BLOCKED: '+card.blockers.join('; ')+'</div>':'')+
        (card.depends_on&&card.depends_on.length?'<div style="color:#666;margin-top:2px">depends on: '+card.depends_on.join(', ')+'</div>':'')+
        '</div>';
    m.onclick=function(ev){ev.stopPropagation();m.classList.toggle('open');};
    if(card.id)m.title=card.id;
    return m;
}

function nav(d){const n=idx+d;if(n>=0&&n<cols.length){idx=n;showColumn();}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')nav(-1);if(e.key==='ArrowRight')nav(1);});

fetchData();
setInterval(fetchData,30000);
</script>
</body>
</html>
