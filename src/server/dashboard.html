<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SiHankor - 司衡工厂产线</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:-apple-system,system-ui,sans-serif;height:100vh;display:flex;overflow:hidden}

/* ---- left sidebar ---- */
.sidebar{flex:0 0 10%; min-width:140px;background:#111827;display:flex;flex-direction:column;border-right:1px solid #0f3460}
.sidebar h1{font-size:14px;color:#e94560;padding:12px 14px;border-bottom:1px solid #0f3460;flex-shrink:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:4px 0;scrollbar-width:thin;scrollbar-color:#0f3460 #111827}
.nav-item{padding:10px 14px;font-size:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-left:3px solid transparent;transition:.15s}
.nav-item:hover{background:#16213e}
.nav-item.active{border-left-color:#e94560;background:#16213e;font-weight:bold}
.nav-item .n-badge{font-size:10px;padding:2px 7px;border-radius:8px;background:#0f3460;min-width:24px;text-align:center}
.nav-item .n-err{background:#e94560}
.nav-item .n-warn{background:#f0a500;color:#000}
.nav-item .n-live{border-left-color:#4fc3f7!important}
.sidebar-foot{flex-shrink:0;padding:10px 14px;border-top:1px solid #0f3460;font-size:10px;color:#555}
.sidebar-foot div{padding:1px 0}

/* filter */
.sidebar-filter{flex-shrink:0;padding:8px 12px;border-top:1px solid #0f3460;border-bottom:1px solid #0f3460}
.filter-label{font-size:9px;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.f-btn{font-size:10px;padding:3px 8px;border-radius:3px;border:1px solid #0f3460;background:#1a1a2e;color:#888;cursor:pointer;margin:2px 2px 2px 0;transition:.15s}
.f-btn:hover{border-color:#e94560;color:#e0e0e0}
.f-btn.active{background:#16213e;color:#e0e0e0;border-color:#e94560}
.f-err.active{background:#e94560;border-color:#e94560;color:#fff}
.f-warn.active{background:#f0a500;border-color:#f0a500;color:#000}
.f-live.active{background:#4fc3f7;border-color:#4fc3f7;color:#000}

/* ---- main area ---- */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.top-bar{flex-shrink:0;background:#16213e;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #0f3460}
.top-bar .phase-title{font-size:15px;font-weight:bold}
.top-bar .badges{display:flex;gap:6px;font-size:10px}
.badge{padding:2px 8px;border-radius:4px;font-weight:bold}
.b-ok{background:#0f3460}
.b-err{background:#e94560;color:#fff}
.b-warn{background:#f0a500;color:#000}

.middle{display:flex;flex:1;overflow:hidden}
/* ---- card list ---- */
.card-list{flex:0 0 22%; min-width:180px; border-right:1px solid #0f3460;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:#0f3460 #1a1a2e}
.card-list .desc{font-size:11px;color:#888;margin-bottom:10px}
.card{background:#16213e;border:1px solid #0f3460;border-radius:5px;padding:8px 12px;margin-bottom:6px;cursor:pointer;transition:.15s;display:flex;justify-content:space-between;align-items:center}
.card:hover{border-color:#e94560}
.card.selected{border-color:#e94560;background:#1a1a3e}
.card .ctitle{font-size:12px;font-weight:bold;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .cmeta{font-size:10px;color:#999;margin-left:8px;flex-shrink:0}
.card .cdot{width:7px;height:7px;border-radius:50%;margin-left:6px;flex-shrink:0}
.dot-ok{background:#0f3460}
.dot-warn{background:#f0a500}
.dot-err{background:#e94560}
.dot-pend{background:#555}
.dot-live{background:#4fc3f7;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.verify-group{margin-bottom:8px}
.verify-group .vhead{font-size:10px;color:#e94560;padding:3px 0;border-bottom:1px solid #0f3460;margin-bottom:3px;cursor:pointer;display:flex;justify-content:space-between}
.verify-group.shut .card{display:none}
.verify-group.shut .vhead{margin-bottom:0;border-bottom:none}
.empty{color:#444;text-align:center;padding:40px;font-size:13px}

/* ---- right detail panel ---- */
.detail-panel{flex:1;background:#111827;border-left:1px solid #0f3460;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#0f3460 #111827}
.detail-inner{padding:20px 24px;max-width:800px}
.detail-inner h3{font-size:15px;color:#e94560;margin-bottom:10px}
.detail-inner .row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #0f3460;font-size:12px}
.detail-inner .row .label{color:#888}
.detail-inner .row .val{font-weight:bold;text-align:right;max-width:60%;overflow:hidden;text-overflow:ellipsis}
.detail-inner .section{margin-top:14px}
.detail-inner .section h4{font-size:11px;color:#e94560;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.detail-inner .section .text{font-size:11px;color:#aaa;line-height:1.6}
.detail-inner .blocked{background:#e94560;color:#fff;font-size:11px;padding:6px 10px;border-radius:4px;margin-top:8px}
.detail-close{float:right;cursor:pointer;color:#888;font-size:16px;line-height:1}
.detail-close:hover{color:#e94560}
.detail-empty{color:#555;text-align:center;padding:40px 16px;font-size:12px}

/* action buttons */
.actions{display:flex;gap:6px;flex-wrap:wrap}
.act-btn{background:#0f3460;color:#e0e0e0;border:1px solid #1a4a7a;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:11px;transition:.15s}
.act-btn:hover{border-color:#e94560}
.act-advance{background:#16213e;border-color:#e94560}
.act-advance:hover{background:#e94560;color:#fff}
.act-assay{background:#16213e;border-color:#f0a500}
.act-assay:hover{background:#f0a500;color:#000}
.act-correct{background:#16213e;border-color:#4fc3f7;margin-top:8px}
.act-correct:hover{background:#4fc3f7;color:#000}
.act-copy{background:#16213e;border-color:#888}
.act-copy:hover{background:#888;color:#fff}
.act-push{background:#16213e;border-color:#4fc3f7}
.act-push:hover{background:#4fc3f7;color:#000}

/* ---- bottom bar ---- */
.bottom-bar{flex-shrink:0;background:#111827;border-top:1px solid #0f3460;padding:6px 14px;display:flex;justify-content:space-between;align-items:center}
.bottom-bar .step{font-size:10px;color:#888}
.bottom-bar button{background:#16213e;color:#e0e0e0;border:1px solid #0f3460;padding:4px 12px;border-radius:3px;cursor:pointer;font-size:11px}
.bottom-bar button:hover:not(:disabled){border-color:#e94560}
.bottom-bar button:disabled{opacity:.3;cursor:default}
</style>
</head>
<body>

<!-- LEFT SIDEBAR -->
<nav class="sidebar">
<h1>SiHankor</h1>
<div class="sidebar-nav" id="sidebar-nav"></div>
<div class="sidebar-filter" id="sidebar-filter">
<div class="filter-label">筛选</div>
<button class="f-btn active" onclick="setFilter('all')">全部</button>
<button class="f-btn f-err" onclick="setFilter('error')">Error</button>
<button class="f-btn f-warn" onclick="setFilter('warning')">Warning</button>
<button class="f-btn f-live" onclick="setFilter('in_progress')">进行中</button>
</div>
<div class="sidebar-foot" id="sidebar-foot"></div>
</nav>

<!-- MAIN -->
<div class="main">
<div class="top-bar">
<span class="phase-title" id="phase-title">--</span>
<div class="badges">
<span id="b-fatal" class="badge b-err" style="display:none">F:0</span>
<span id="b-warn" class="badge b-warn" style="display:none">G:0</span>
<span id="b-total" class="badge b-ok">总:0</span>
</div>
</div>

<div class="middle">
<!-- card list -->
<div class="card-list" id="card-list"><div class="empty">加载中...</div></div>

<!-- detail panel -->
<div class="detail-panel" id="detail-panel">
<div class="detail-empty">选择一张卡片查看详情</div>
</div>
</div>

<div class="bottom-bar">
<span class="step" id="step-label">-</span>
<div style="display:flex;gap:6px">
<button id="btn-prev" onclick="nav(-1)">上一步</button>
<button id="btn-next" onclick="nav(1)">下一步</button>
</div>
</div>
</div>

<script>
let idx=0,cols=[],data=null,selCard=null,filter='all';

function setFilter(f){
    filter=f;
    document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
    const btn=document.querySelector('.f-btn.'+(f==='error'?'f-err':f==='warning'?'f-warn':f==='in_progress'?'f-live':''))||document.querySelector('.f-btn');
    if(btn)btn.classList.add('active');
    showColumn();
}

function filterCards(cards){
    if(filter==='all')return cards;
    return cards.filter(c=>{
        const s=(c.status||'').toLowerCase();
        if(filter==='error')return s==='error';
        if(filter==='warning')return s==='warning';
        if(filter==='in_progress')return s==='in_progress'||s==='live';
        return true;
    });
}

async function fetchData(){
    try{
        const r=await fetch('/api/dashboard');
        data=await r.json();
        cols=data.columns||[];
        render();
    }catch(e){
        document.getElementById('card-list').innerHTML='<div class="empty">'+e.message+'</div>';
    }
}

function render(){
    if(!cols.length)return;

    const all=cols.flatMap(c=>c.cards||[]);
    const e=all.filter(c=>c.status==='Error'||c.status==='error').length;
    const w=all.filter(c=>c.status==='Warning'||c.status==='warning').length;
    const bf=document.getElementById('b-fatal');
    bf.textContent='F:'+e;
    bf.style.display=e?'inline':'none';
    const bw=document.getElementById('b-warn');
    bw.textContent='G:'+w;
    bw.style.display=w?'inline':'none';
    document.getElementById('b-total').textContent='总:'+data.summary.total_cards;

    // sidebar nav
    const sn=document.getElementById('sidebar-nav');
    sn.innerHTML='';
    for(let i=0;i<cols.length;i++){
        const c=cols[i];const cs=c.cards||[];
        const ce=cs.filter(x=>x.status==='Error'||x.status==='error').length;
        const cw=cs.filter(x=>x.status==='Warning'||x.status==='warning').length;
        const live=cs.some(x=>x.status==='in_progress');
        const ni=document.createElement('div');
        ni.className='nav-item'+(i===idx?' active':'')+(live?' n-live':'');
        ni.innerHTML=c.label+'<span class="n-badge'+(ce?' n-err':cw?' n-warn':'')+'">'+(ce||cw||cs.length)+'</span>';
        ni.onclick=()=>{idx=i;selectCard(null);render();};
        sn.appendChild(ni);
    }

    // sidebar foot
    const sf=document.getElementById('sidebar-foot');
    sf.innerHTML='<div>活跃:'+all.filter(c=>c.status==='in_progress').length+'</div><div>阻塞:'+(data.summary.blocked_cards||0)+'</div><div>完成:'+(data.summary.done_cards||0)+'</div>';

    showColumn();
}

function showColumn(){
    const col=cols[idx];let cards=col.cards||[];
    cards=filterCards(cards);
    const live=cards.some(c=>c.status==='in_progress');
    document.getElementById('phase-title').textContent=col.label+(filter!=='all'?' ['+filter+']':'');
    document.getElementById('phase-title').style.color=live?'#e94560':'#e0e0e0';

    document.querySelectorAll('.nav-item').forEach((n,i)=>n.classList.toggle('active',i===idx));

    const list=document.getElementById('card-list');
    list.innerHTML='<div class="desc">'+(col.entry_condition||'')+'</div>';

    if(!cards.length){
        list.innerHTML+='<div class="empty">--- 空闲 ---</div>';
    }else if(col.phase==='verify'){
        const groups=col.groups||[];
        if(groups.length){
            for(const g of groups){
                const d=document.createElement('div');d.className='verify-group';
                d.innerHTML='<div class="vhead" onclick="this.parentElement.classList.toggle(\'shut\')">'+g.nature+' ('+g.attention.length+')</div>';
                for(const c of g.attention||[])d.appendChild(cardEl(c));
                list.appendChild(d);
            }
        }
        for(const c of cards)list.appendChild(cardEl(c));
    }else{
        for(const c of cards)list.appendChild(cardEl(c));
        const last=cards[cards.length-1];
        if(last&&col.phase==='verify')list.querySelectorAll('.card').forEach(c=>{c.classList.remove('selected');});
    }

    document.getElementById('step-label').textContent=(idx+1)+' / '+cols.length;
    document.getElementById('btn-prev').disabled=idx===0;
    document.getElementById('btn-next').disabled=idx===cols.length-1;
}

function cardEl(card){
    const m=document.createElement('div');m.className='card';
    const t=(card.title||card.id||'?').slice(0,55);
    let dot='dot-ok',vBadge='';
    if(card.status==='Error'||card.status==='error'){dot='dot-err';vBadge='<span style="font-size:9px;background:#e94560;color:#fff;padding:1px 4px;border-radius:3px;margin-left:4px">E</span>';}
    else if(card.status==='Warning'||card.status==='warning'){dot='dot-warn';vBadge='<span style="font-size:9px;background:#f0a500;color:#000;padding:1px 4px;border-radius:3px;margin-left:4px">W</span>';}
    else if(card.status==='in_progress')dot='dot-live';
    else if(card.status==='pending')dot='dot-pend';
    const s=card.stage||'';
    const n=card.nature||card.entity_type||'';
    m.innerHTML='<span class="ctitle">'+t+vBadge+'</span><span class="cmeta">'+(s?'['+s+'] ':'')+n+'</span><span class="cdot '+dot+'"></span>';
    m.onclick=function(ev){ev.stopPropagation();selectCard(card);};
    if(card.id)m.title=card.id;
    return m;
}

function selectCard(card){
    selCard=card;
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
    if(card){
        const cards=document.querySelectorAll('.card');
        for(const c of cards){
            if(c.querySelector('.ctitle')&&c.querySelector('.ctitle').textContent===card.title.slice(0,55)){c.classList.add('selected');break;}
        }
        showDetail(card);
    }else{
        document.getElementById('detail-panel').innerHTML='<div class="detail-empty">选择一张卡片查看详情</div>';
    }
}

function showDetail(card){
    const panel=document.getElementById('detail-panel');
    let html='<div class="detail-inner">';
    html+='<span class="detail-close" onclick="selectCard(null)">x</span>';
    html+='<h3>'+(card.title||card.id)+'</h3>';
    html+='<div class="row"><span class="label">ID</span><span class="val">'+(card.id||'-')+'</span></div>';
    html+='<div class="row"><span class="label">Stage</span><span class="val">'+(card.stage||'-')+'</span></div>';
    html+='<div class="row"><span class="label">Nature</span><span class="val">'+(card.nature||card.entity_type||'-')+'</span></div>';
    html+='<div class="row"><span class="label">Status</span><span class="val">'+(card.status||'-')+'</span></div>';
    if(card.summary){
        html+='<div class="section"><h4>摘要</h4><div class="text">'+card.summary+'</div></div>';
    }
    if(card.blockers&&card.blockers.length){
        html+='<div class="blocked">BLOCKED: '+card.blockers.join('; ')+'</div>';
    }
    if(card.depends_on&&card.depends_on.length){
        html+='<div class="section"><h4>依赖</h4><div class="text">'+card.depends_on.join(', ')+'</div></div>';
    }
    if(card.gaps&&card.gaps.length&&card.gaps.some(g=>g.includes('引用缺失'))){
        html+='<button class="act-btn act-fixref" onclick="doFixRefs(\''+card.id+'\')" style="margin-top:6px">修复</button>';
    }

    // Action buttons
    html+='<div class="section"><h4>操作</h4><div class="actions">';
    const stage=card.stage||'';
    if(stage==='1/3'||stage==='2/3'){
        const next=stage==='1/3'?'2/3':'3/3';
        html+='<button class="act-btn act-advance" id="btn-advance" onclick="doStage(\''+card.id+'\',\''+stage+'\')" disabled style="opacity:0.3" title="请先运行合道检查">推进到 '+next+'</button>';
    }
    html+='<button class="act-btn act-assay" onclick="doAssay(\''+card.id+'\')">合道检查</button>';
    html+='</div></div>';
    html+='<div id="act-msg" style="margin-top:8px;font-size:11px"></div>';

    html+='</div>';
    panel.innerHTML=html;
}

async function doStage(docId, current){
    const msg=document.getElementById('act-msg');
    if(!confirm('确认推进 '+docId+' 从 '+current+' 到 '+(current==='1/3'?'2/3':'3/3')+'？'))return;
    try{
        const r=await fetch('/api/actions/stage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({doc_id:docId})});
        const d=await r.json();
        msg.innerHTML=d.ok?'<span style="color:#4fc3f7">'+d.message+'</span>':'<span style="color:#e94560">'+d.message+'</span>';
        if(d.ok)setTimeout(fetchData,500);
    }catch(e){msg.innerHTML='<span style="color:#e94560">'+e.message+'</span>';}
}

async function doAssay(docId){
    const msg=document.getElementById('act-msg');
    msg.textContent='合道检查中...';
    try{
        const r=await fetch('/api/actions/assay',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({doc_id:docId})});
        const d=await r.json();
        if(d.ok){
            let html='<div style="font-weight:bold;margin-bottom:6px;color:'+(d.overall==='pass'?'#4fc3f7':d.overall==='conditional'?'#f0a500':'#e94560')+'">合道: '+d.overall+'</div>';
            const laws=d.laws||[];
            for(const l of laws){
                const icon=l.result==='pass'?'o':l.result==='fail'?'x':'~';
                const color=l.result==='pass'?'#4fc3f7':l.result==='fail'?'#e94560':'#f0a500';
                html+='<div style="font-size:11px;margin:2px 0"><span style="color:'+color+'">'+icon+'</span> '+l.law+': '+l.note+'</div>';
            }
            if(d.gaps&&d.gaps.length){
                html+='<div style="margin-top:6px;font-size:10px;color:#888">'+d.gaps.join('; ')+'</div>';
                html+='<button class="act-btn act-fixref" onclick="doFixRefs(\''+docId+'\')" style="margin-top:4px">修复</button>';
            }
            if(d.self_question){
                html+='<div style="margin-top:6px;font-size:10px;color:#f0a500">需人工审阅</div>';
            }
            if(d.overall!=='pass' && d.overall!=='conditional'){
                html+='<button class="act-btn act-correct" onclick="doCorrect(\''+docId+'\')" style="margin-top:8px">生成修正提示词</button>';
                const advBtn=document.getElementById('btn-advance');
                if(advBtn){advBtn.disabled=true;advBtn.title='合道检查未通过，无法推进';advBtn.style.opacity='0.3';}
            }else{
                const advBtn=document.getElementById('btn-advance');
                if(advBtn){advBtn.disabled=false;advBtn.title='合道检查通过，可以推进';advBtn.style.opacity='1';}
            }
            msg.innerHTML=html;
        }else{
            msg.innerHTML='<span style="color:#e94560">'+d.message+'</span>';
        }
    }catch(e){msg.innerHTML='<span style="color:#e94560">'+e.message+'</span>';}
}

async function doCorrect(docId){
    const msg=document.getElementById('act-msg');
    msg.textContent='生成中...';
    try{
        const r=await fetch('/api/actions/correct',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({doc_id:docId})});
        const d=await r.json();
        if(d.ok){
            const promptText=d.correction_prompt||'';
            msg.innerHTML='<div style="font-weight:bold;color:#f0a500;margin-bottom:4px">修正提示词</div><pre id="prompt-text" style="background:#0a0a1e;color:#aaa;padding:10px;border-radius:4px;font-size:11px;white-space:pre-wrap;max-height:200px;overflow-y:auto">'+promptText+'</pre>'+
                '<div style="display:flex;gap:6px;margin-top:8px">'+
                '<button class="act-btn act-copy" onclick="navigator.clipboard.writeText(document.getElementById(\'prompt-text\').textContent)">复制</button>'+
                '<button class="act-btn act-push" onclick="doPush(\''+docId+'\')">直接发送给 Agent</button>'+
                '<button class="act-btn" onclick="doAssay(\''+docId+'\')">重新检查</button>'+
                '</div>';
        }else{
            msg.innerHTML='<span style="color:#e94560">'+d.message+'</span>';
        }
    }catch(e){msg.innerHTML='<span style="color:#e94560">'+e.message+'</span>';}
}

async function doPush(docId){
    const msg=document.getElementById('act-msg');
    msg.textContent='发送中...';
    try{
        const r=await fetch('/api/actions/push-correction',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({doc_id:docId})});
        const d=await r.json();
        if(d.ok){
            const cmd='执行合道修正任务: '+docId;
            msg.innerHTML='<div style="color:#4fc3f7;font-weight:bold;margin-bottom:4px">已推送 '+docId+'</div>'+
                '<div style="margin-bottom:6px;font-size:11px;color:#888">发送下面这句话给 Reasonix 即可自动执行：</div>'+
                '<pre style="background:#0a0a1e;color:#4fc3f7;padding:8px;border-radius:4px;font-size:12px;cursor:pointer" onclick="navigator.clipboard.writeText(this.textContent);this.style.background=\'#0a1a1e\'">'+cmd+'</pre>'+
                '<div style="font-size:10px;color:#555;margin-top:2px">点击复制后粘贴到 Reasonix 对话中</div>'+
                '<button class="act-btn" onclick="doAssay(\''+docId+'\')" style="margin-top:6px">重新检查</button>';
        }else{
            msg.innerHTML='<span style="color:#e94560">'+d.message+'</span>';
        }
    }catch(e){msg.innerHTML='<span style="color:#e94560">'+e.message+'</span>';}
}

async function doFixRefs(docId){
    const msg=document.getElementById('act-msg');
    msg.textContent='修复中...';
    try{
        const r=await fetch('/api/actions/fix-refs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({doc_id:docId})});
        const d=await r.json();
        msg.innerHTML=d.ok?'<div style="color:#4fc3f7">'+d.message+'</div><button class="act-btn" onclick="doAssay(\''+docId+'\')" style="margin-top:6px">重新合道检查</button>':'<span style="color:#e94560">'+d.message+'</span>';
    }catch(e){msg.innerHTML='<span style="color:#e94560">'+e.message+'</span>';}
}

function nav(d){const n=idx+d;if(n>=0&&n<cols.length){idx=n;selectCard(null);showColumn();}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')nav(-1);if(e.key==='ArrowRight')nav(1);if(e.key==='Escape')selectCard(null);});

fetchData();
setInterval(fetchData,30000);
</script>
</body>
</html>
