<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SiHankor - 司衡工厂产线</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:#16213e;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #0f3460;flex-shrink:0}
header h1{font-size:18px;color:#e94560}
header .status{display:flex;gap:12px;font-size:12px;align-items:center}
header .status span{padding:3px 10px;border-radius:4px;font-weight:bold}
.s-fatal{background:#e94560;color:#fff}
.s-warn{background:#f0a500;color:#000}
.s-ok{background:#0f3460;color:#e0e0e0}
.s-summary{margin-left:8px;font-size:11px;color:#888}

/* Kanban scroll area */
.kanban-scroll{flex:1;overflow-x:auto;overflow-y:hidden;padding:16px 12px}
.kanban-board{display:flex;gap:12px;height:100%;min-width:min-content}
.kanban-column{flex:0 0 260px;background:#16213e;border-radius:8px;border:1px solid #0f3460;display:flex;flex-direction:column;max-height:100%}
.column-header{padding:12px 14px 8px;border-bottom:1px solid #0f3460;flex-shrink:0}
.column-header h2{font-size:14px;display:flex;justify-content:space-between;align-items:center}
.column-header .count{font-size:11px;color:#888;font-weight:normal}
.column-body{flex:1;overflow-y:auto;padding:8px 10px;scrollbar-width:thin;scrollbar-color:#0f3460 #16213e}

/* Compact card */
.card{background:#1a1a2e;border:1px solid #0f3460;border-radius:5px;padding:8px 10px;margin-bottom:6px;cursor:default;transition:border-color .2s}
.card:hover{border-color:#e94560}
.card-title{font-size:12px;font-weight:bold;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-meta{font-size:10px;color:#999;margin-bottom:2px}
.card-summary{font-size:9px;color:#666;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:3px}
.card-blocked{font-size:9px;color:#e94560;margin-top:2px;font-weight:bold}

/* Card status colors */
.card-status{float:right;width:8px;height:8px;border-radius:50%;margin-left:6px;margin-top:3px}
.cs-ok{background:#0f3460}
.cs-warn{background:#f0a500}
.cs-error{background:#e94560}
.cs-pending{background:#555}
.cs-in-progress{background:#4fc3f7;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Verify column: grouped */
.verify-group{margin-bottom:8px}
.verify-group-header{font-size:10px;color:#e94560;padding:4px 0;border-bottom:1px solid #0f3460;margin-bottom:4px;cursor:pointer;display:flex;justify-content:space-between}
.verify-group-header .g-count{font-size:9px;color:#888}
.verify-group.collapsed .card{display:none}
.verify-group.collapsed .verify-group-header{margin-bottom:0;border-bottom:none}

.empty-col{color:#444;font-style:italic;text-align:center;padding:30px 0;font-size:12px}

/* Conveyor arrow between columns */
.conveyor{writing-mode:vertical-lr;text-align:center;color:#0f3460;font-size:20px;flex:0 0 20px;display:flex;align-items:center;justify-content:center;user-select:none}
.conveyor.active{color:#e94560}

.refresh-bar{flex-shrink:0;text-align:center;padding:6px;font-size:10px;color:#444;background:#111}
</style>
</head>
<body>
<header>
<h1>SiHankor 产线</h1>
<div class="status">
<span id="fatal-count" class="s-ok">F:0</span>
<span id="warn-count" class="s-ok">G:0</span>
<span id="total-count" class="s-ok">总:0</span>
<span class="s-summary" id="summary-text"></span>
</div>
</header>
<div class="kanban-scroll">
<div class="kanban-board" id="board"></div>
</div>
<div class="refresh-bar">30s auto-refresh | <span id="last-update">--</span></div>
<script>
async function load(){
    try{
        const r=await fetch('/api/dashboard');
        const d=await r.json();
        render(d);
    }catch(e){
        document.getElementById('board').innerHTML='<div class="empty-col" style="flex:1;padding:40px">连接失败: '+e.message+'</div>';
    }
}

function render(d){
    const board=document.getElementById('board');
    board.innerHTML='';

    // Global stats
    const allCards = d.columns.flatMap(c=>c.cards||[]);
    const errs=allCards.filter(c=>c.status==='Error'||c.status==='error').length;
    const warns=allCards.filter(c=>c.status==='Warning'||c.status==='warning').length;
    document.getElementById('fatal-count').textContent='F:'+errs;
    document.getElementById('fatal-count').className=errs?'s-fatal':'s-ok';
    document.getElementById('warn-count').textContent='G:'+warns;
    document.getElementById('warn-count').className=warns?'s-warn':'s-ok';
    document.getElementById('total-count').textContent='总:'+d.summary.total_cards;
    document.getElementById('summary-text').textContent='活跃:'+(d.summary.active_cards||0)+' 阻塞:'+(d.summary.blocked_cards||0)+' 完成:'+(d.summary.done_cards||0);
    document.getElementById('last-update').textContent=new Date(d.generated_at).toLocaleTimeString();

    for(let i=0;i<d.columns.length;i++){
        const col=d.columns[i];
        const cards=col.cards||[];

        const el=document.createElement('div');
        el.className='kanban-column';

        const hasActive = cards.some(c=>c.status==='in_progress'||c.status==='Error');
        const colColor = hasActive?'#e94560':'#0f3460';

        el.innerHTML='<div class="column-header" style="border-left:3px solid '+colColor+'"><h2>'+col.label+' <span class="count">'+cards.length+'</span></h2></div>'+
            '<div class="column-body" id="col-'+col.phase+'"></div>';

        const body=el.querySelector('.column-body');

        if(!cards.length){
            body.innerHTML='<div class="empty-col">--- 空闲 ---</div>';
        }else if(col.phase==='verify'){
            // Grouped view for verify column
            const groups=col.groups||[];
            if(groups.length){
                for(const g of groups){
                    const gdiv=document.createElement('div');
                    gdiv.className='verify-group';
                    gdiv.innerHTML='<div class="verify-group-header" onclick="this.parentElement.classList.toggle(\'collapsed\')">'+g.nature+' <span class="g-count">'+g.clean_count+'+'+g.attention.length+'</span></div>';
                    for(const card of g.attention||[]){
                        gdiv.appendChild(renderCard(card));
                    }
                    body.appendChild(gdiv);
                }
            }
            // Also show any ungrouped cards
            for(const card of cards){
                body.appendChild(renderCard(card));
            }
        }else{
            for(const card of cards){
                body.appendChild(renderCard(card));
            }
        }

        board.appendChild(el);

        // Conveyor between columns
        if(i < d.columns.length-1){
            const conv=document.createElement('div');
            conv.className='conveyor'+(hasActive?' active':'');
            conv.textContent='\u2192';
            board.appendChild(conv);
        }
    }
}

function renderCard(card){
    const m=document.createElement('div');
    m.className='card';
    const title=(card.title||card.id||'?').slice(0,45);
    let statusClass='cs-ok';
    if(card.status==='Error'||card.status==='error')statusClass='cs-error';
    else if(card.status==='Warning'||card.status==='warning')statusClass='cs-warn';
    else if(card.status==='in_progress')statusClass='cs-in-progress';
    else if(card.status==='pending')statusClass='cs-pending';

    const stage=card.stage||'';
    const nature=card.nature||card.entity_type||'';

    m.innerHTML='<div class="card-title">'+title+'<span class="card-status '+statusClass+'"></span></div>'+
        '<div class="card-meta">'+(stage?'['+stage+'] ':'')+nature+'</div>'+
        (card.summary?'<div class="card-summary">'+(card.summary.slice(0,60))+'</div>':'')+
        (card.blockers&&card.blockers.length?'<div class="card-blocked">BLOCKED: '+card.blockers[0]+'</div>':'');

    if(card.id){
        m.title=card.id;
    }
    return m;
}

load();
setInterval(load,30000);
</script>
</body>
</html>
