  - "MVP 只处理 documents 表，metrics 表清理放到后续 proposal：避免单次变更面过广"
  - "DB schema 不存 file_path 列：不新增，存量也不回填，维持现状"
  - "分支命名 index-stale-prune（per AGENTS.md {topic}-{short-description} 规则）"
risks:
  - "跨分支协议交错：写文件后另一会话在 main 上提交 techne ratification，把我的 checkout 拉回 main，导致我的 commit 实际未生效；后续通过 stash + checkout + stash pop 修复，但说明多 session 并行需要更严格的 checkout 前置检查"
  - "55 条幽灵中可能含合法历史文档 id（如 decisions-index-20260601-001 看起来像合法索引）：必须前置 --prune-dry-run，让用户从 git history 捞回后再删"
  - "行为变更面：rebuild_index 增加删除操作，需要确认现有 CI 流程不会在 --prune-confirm 默认开启时被误触发"
  - "metrics 表清理被推后到后续 proposal，期间 metrics 表仍含幽灵引用，不影响治理信号但占用存储"
