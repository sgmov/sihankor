decisions:
  - "选 Option C（孤儿清理 pass）而非 Option A（排除 stage X）或 Option B（X 跳过校验）：理由是数据库 165 文档 vs 磁盘 110 文件，55 条幽灵条目的根因是 rebuild_index 只 upsert 不 delete；按文件存在性判定孤儿比按 stage/nature 判定更安全"
