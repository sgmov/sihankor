# 司衡引擎配置
# 每个被治理项目的根目录下放置此文件，声明项目级治理参数。

project:
  name: SiHankor
  description: 一个承认治理自身也不完备的代码工程收敛引擎

paths:
  docs: docs/
  glossary: docs/glossary/
  dirs:
    specs: specs
    proposals: proposals
    decisions: decisions
    reference: reference
    notes: notes

lifecycle:
  enabled: true
  main_flow: [propose, resolve, ratify]
  correction_flow: reopen
  replacement_flow: supersede

notes:
  review_after_days: 90
  foundational_ref_threshold: 10
  promotion_ref_count: 3
  promotion_min_dirs: 2

validation:
  # type-目录非法组合校验
  illegal_type_dir:
    proposals: [tao, arche]
    notes: [tao, arche]
  # glossary 校验
  glossary_checks:
    - orphan
    - stale
    - unregistered
    - untranslated
    - dangling
    - duplicate

engine:
  scan_extensions: [.md, .sih.md]
  index_by: [id, type, stage, upstream, domain]
